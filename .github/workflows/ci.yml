name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint TypeScript sources
        run: pnpm run lint

      - name: Typecheck library and tests
        run: pnpm run typecheck

      - name: Rust clippy
        run: cargo clippy --all-targets

      - name: Rust unit tests
        run: cargo test --lib --no-default-features

      - name: Build native + TypeScript
        run: pnpm run build

      - name: Run full test suite
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run browser compatibility smoke
        run: pnpm run test:browser:e2e

      - name: Run concurrency performance gate
        env:
          HTTP3_CONCURRENCY_MAX_MS: '12000'
        run: pnpm run perf:concurrency-gate

      - name: Run load smoke gate
        env:
          HTTP3_LOAD_SMOKE_TOTAL: '150'
          HTTP3_LOAD_SMOKE_CONCURRENCY: '25'
          HTTP3_LOAD_SMOKE_MAX_MS: '10000'
        run: pnpm run perf:load-smoke-gate

      - name: Smoke install from packed artifact
        run: pnpm run smoke:install

  docker-runtime-matrix-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup QEMU for arm64 containers
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run Linux arm64 Docker runtime matrix
        env:
          DOCKER_RUNTIME_PLATFORM: linux/arm64
        run: pnpm run test:docker:runtime
