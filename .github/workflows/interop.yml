name: Interop

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  curl-interop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native + tests
        run: pnpm run build && pnpm run build:test

      - name: Run TypeScript interop lane
        run: pnpm run test:interop

  quiche-loopback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run quiche UDP loopback interop tests
        run: cargo test --test interop_udp_loopback

      - name: Run quiche direct H3 interop tests
        run: cargo test --test interop_quiche_direct
