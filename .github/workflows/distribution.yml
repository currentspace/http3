name: Distribution

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is excluded: the Rust transport on main has
        # unresolved `PlatformDriver` / `create_platform_driver` /
        # `PlatformWaker` references on Windows targets and the
        # native build fails to compile. Tracked separately.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build release artifact
        run: pnpm run build

      - name: Run release packaging lane
        run: pnpm run test:release

      - name: Smoke install packed artifact
        run: pnpm run smoke:install
